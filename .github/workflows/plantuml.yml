name: Generate PlantUML Diagrams

on:
  push:
    branches: [main]
    paths:
      - 'doc/**/*.puml'
      - '.github/workflows/plantuml.yml'
  pull_request:
    paths:
      - 'doc/**/*.puml'
      - '.github/workflows/plantuml.yml'

concurrency:
  group: plantuml-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-svg:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install PlantUML and CJK fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk plantuml

      - name: Generate SVG from PlantUML
        run: |
          find doc -name '*.puml' -exec plantuml -tsvg -charset UTF-8 {} +
          echo "Generated SVG files:"
          find doc -name '*.svg' -ls

      - name: Commit generated SVGs
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 'doc/*.svg'
          git diff --cached --quiet || git commit -m "chore: regenerate PlantUML diagrams"
          git push
