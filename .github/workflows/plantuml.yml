name: Generate PlantUML Diagrams

on:
  push:
    branches: [main]
    paths:
      - 'doc/**.puml'
      - 'doc/**/*.puml'

concurrency:
  group: plantuml-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-svg:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install PlantUML and CJK fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk plantuml

      - name: Get changed .puml files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only --diff-filter=ACM origin/${{ github.base_ref }} -- 'doc/**.puml')
          else
            if [ $(git rev-list --count HEAD) -gt 1 ]; then
              FILES=$(git diff --name-only --diff-filter=ACM HEAD~1 -- 'doc/**.puml')
            else
              FILES=$(git ls-files -- 'doc/**.puml')
            fi
          fi
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "Changed .puml files:"
          echo "$FILES"

      - name: Generate SVG from PlantUML
        if: steps.changed.outputs.files != ''
        run: |
          echo "$FILES" | xargs plantuml -tsvg -charset UTF-8
          echo "Generated SVG files:"
          find doc -name '*.svg' -newer HEAD -ls
        env:
          FILES: ${{ steps.changed.outputs.files }}

      - name: Commit generated SVGs
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 'doc/*.svg'
          git diff --cached --quiet || git commit -m "chore: regenerate PlantUML diagrams"
          git push
